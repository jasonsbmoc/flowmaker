<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hilma af Klint Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar:   #ffffff;
      --bg:        #f0f0f0;
      --border:    #e4e4e4;
      --text:      #111111;
      --muted:     #888888;
      --dim:       #cccccc;
      --track:     #e0e0e0;
      --thumb:     #111111;
      --sel-bg:    #f5f5f5;
      --btn-bg:    #111111;
      --btn-fg:    #ffffff;
      --btn2-bg:   #f0f0f0;
      --btn2-fg:   #111111;
      --btn2-bdr:  #e0e0e0;
      --shadow:    rgba(0,0,0,0.1);
    }
    [data-theme="dark"] {
      --sidebar:   #141414;
      --bg:        #0c0c0c;
      --border:    #252525;
      --text:      #e0e0e0;
      --muted:     #666666;
      --dim:       #333333;
      --track:     #2a2a2a;
      --thumb:     #e0e0e0;
      --sel-bg:    #1e1e1e;
      --btn-bg:    #e0e0e0;
      --btn-fg:    #111111;
      --btn2-bg:   #1e1e1e;
      --btn2-fg:   #e0e0e0;
      --btn2-bdr:  #2a2a2a;
      --shadow:    rgba(0,0,0,0.5);
    }

    body {
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background 0.2s;
    }

    #sidebar {
      width: 256px;
      min-width: 256px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #header-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.5;
    }
    #btn-theme {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #btn-theme:hover { color: var(--text); border-color: var(--muted); }

    #controls {
      flex: 1;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    .section { display: flex; flex-direction: column; gap: 8px; }

    .sec-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .row { display: flex; flex-direction: column; gap: 4px; }

    .lbl {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      color: var(--text);
    }
    .val {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 1px;
      background: var(--track);
      outline: none;
      cursor: pointer;
      margin: 3px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--thumb);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    select {
      width: 100%;
      background: var(--sel-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      appearance: none;
      border-radius: 4px;
    }
    select:focus { border-color: var(--muted); }

    .palette-dots { display: flex; gap: 4px; flex-wrap: wrap; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }

    hr.div { border: none; border-top: 1px solid var(--border); }

    #footer {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn {
      padding: 9px 0;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: inherit;
      border-radius: 4px;
      width: 100%;
      transition: opacity 0.12s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:active { opacity: 0.6; }
    .btn-primary   { background: var(--btn-bg); color: var(--btn-fg); }
    .btn-secondary { background: var(--btn2-bg); color: var(--btn2-fg); border: 1px solid var(--btn2-bdr); }

    #status { font-size: 10px; color: var(--muted); text-align: center; min-height: 14px; letter-spacing: 0.06em; }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    #canvas-container canvas {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 4px 32px var(--shadow);
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="header">
    <div id="header-title">Hilma af Klint<br>Generator</div>
    <button id="btn-theme" title="Toggle dark mode">◑</button>
  </div>

  <div id="controls">

    <div class="section">
      <div class="sec-title">Palette</div>
      <select id="sel-palette">
        <option value="celestial">Celestial</option>
        <option value="mystic">Mystic</option>
        <option value="earth">Earth</option>
        <option value="nordic">Nordic</option>
      </select>
      <div class="palette-dots" id="palette-dots"></div>
    </div>

    <hr class="div">

    <div class="section">
      <div class="sec-title">Shape</div>
      <div class="row">
        <div class="lbl"><span>Primary</span></div>
        <select id="sel-shape">
          <option value="rings">Rings</option>
          <option value="spokes">Spokes</option>
          <option value="square">Square</option>
          <option value="triangle">Triangle</option>
          <option value="star">Star</option>
          <option value="floral">Floral</option>
          <option value="nested">Nested Squares</option>
          <option value="cross">Cross</option>
        </select>
      </div>
      <div class="row">
        <div class="lbl"><span>Overlay</span></div>
        <select id="sel-overlay">
          <option value="none">None</option>
          <option value="rings">Rings</option>
          <option value="star">Star</option>
          <option value="triangle">Triangle</option>
          <option value="diamond">Diamond</option>
          <option value="spokes">Spokes</option>
          <option value="floral">Floral</option>
        </select>
      </div>
      <div class="row">
        <div class="lbl">
          <span>Scale</span>
          <span class="val" id="val-scale">55%</span>
        </div>
        <input type="range" id="sl-scale" min="22" max="82" value="55">
      </div>
      <div class="row">
        <div class="lbl">
          <span>Count</span>
          <span class="val" id="val-count">6</span>
        </div>
        <input type="range" id="sl-count" min="3" max="12" step="1" value="6">
      </div>
    </div>

    <hr class="div">

    <div class="section">
      <div class="sec-title">Watercolor</div>
      <div class="row">
        <div class="lbl"><span>Opacity</span><span class="val" id="val-opacity">130</span></div>
        <input type="range" id="sl-opacity" min="40" max="210" value="130">
      </div>
      <div class="row">
        <div class="lbl"><span>Bleed</span><span class="val" id="val-bleed">0.35</span></div>
        <input type="range" id="sl-bleed" min="0" max="90" value="35">
      </div>
      <div class="row">
        <div class="lbl"><span>Texture</span><span class="val" id="val-texture">0.30</span></div>
        <input type="range" id="sl-texture" min="0" max="90" value="30">
      </div>
    </div>

    <hr class="div">

    <div class="section">
      <div class="sec-title">Linework</div>
      <div class="row">
        <div class="lbl"><span>Brush</span></div>
        <select id="sel-brush">
          <option value="cpencil">Colored Pencil</option>
          <option value="HB">HB Pencil</option>
          <option value="2B">2B Pencil</option>
          <option value="2H">2H Pencil</option>
          <option value="pen">Pen</option>
          <option value="rotring">Rotring</option>
        </select>
      </div>
      <div class="row">
        <div class="lbl"><span>Style</span></div>
        <select id="sel-linestyle">
          <option value="none">None</option>
          <option value="cross">Cross</option>
          <option value="radial">Radial</option>
          <option value="sunburst">Sunburst</option>
          <option value="concentric">Concentric</option>
          <option value="grid">Grid</option>
          <option value="diagonal">Diagonal</option>
          <option value="frame">Frame</option>
        </select>
      </div>
      <div class="row">
        <div class="lbl"><span>Density</span><span class="val" id="val-density">4</span></div>
        <input type="range" id="sl-density" min="1" max="12" step="1" value="4">
      </div>
      <div class="row">
        <div class="lbl"><span>Weight</span><span class="val" id="val-weight">0.60</span></div>
        <input type="range" id="sl-weight" min="10" max="180" value="60">
      </div>
    </div>

    <hr class="div">

    <div class="section">
      <div class="sec-title">Seed</div>
      <div class="row">
        <div class="lbl"><span>Variation</span><span class="val" id="val-seed">42</span></div>
        <input type="range" id="sl-seed" min="1" max="999" value="42">
      </div>
    </div>

  </div>

  <div id="footer">
    <button class="btn btn-primary"   id="btn-randomize">Randomize</button>
    <button class="btn btn-secondary" id="btn-export">Export PNG</button>
    <div id="status"></div>
  </div>
</div>

<div id="canvas-container"></div>

<script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush"></script>
<script>
// ─── Palettes ─────────────────────────────────────────────────────────────────

const PALETTES = {
  celestial: {
    lineColor: '#2C1E10',
    colors: ['#1A1A1A','#7B5898','#6E8EAA','#7EA88A','#D8C040','#D89030','#B84028','#F4EEE4']
  },
  mystic: {
    lineColor: '#22143A',
    colors: ['#221430','#7A6898','#A898C0','#C098A0','#C08038','#E0CC80','#F2ECE4','#6888AA']
  },
  earth: {
    lineColor: '#281408',
    colors: ['#281408','#582E20','#A85840','#C08830','#CCBA90','#88A880','#406850','#E8E0CC']
  },
  nordic: {
    lineColor: '#180E24',
    colors: ['#180E24','#6848A0','#9890C0','#A8C0D8','#80A870','#C898A0','#C08838','#F0EAE0']
  }
};

// ─── Params ───────────────────────────────────────────────────────────────────

let params = {
  palette:      'celestial',
  darkMode:     false,
  primaryShape: 'rings',
  overlay:      'none',
  ringScale:    55,
  count:        6,
  fillOpacity:  130,
  fillBleed:    35,
  fillTexture:  30,
  lineBrush:    'cpencil',
  lineStyle:    'radial',
  lineDensity:  4,
  lineWeight:   60,
  seed:         42
};

// ─── Geometry helpers ─────────────────────────────────────────────────────────

function ringPts(cx, cy, r, steps = 80) {
  let pts = [];
  for (let i = 0; i < steps; i++) {
    let a = (i / steps) * Math.PI * 2;
    pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
  }
  return pts;
}

function squarePts(cx, cy, s, rot = 0) {
  let corners = [[-s,-s],[s,-s],[s,s],[-s,s]];
  let c = Math.cos(rot), si = Math.sin(rot);
  return corners.map(([x,y]) => [cx + x*c - y*si, cy + x*si + y*c]);
}

function triPts(cx, cy, r, rot = -Math.PI/2) {
  return [0,1,2].map(i => {
    let a = (i/3)*Math.PI*2 + rot;
    return [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
  });
}

function starPts(cx, cy, outerR, innerR, n) {
  let pts = [];
  for (let i = 0; i < n*2; i++) {
    let r = (i%2===0) ? outerR : innerR;
    let a = (i/(n*2))*Math.PI*2 - Math.PI/2;
    pts.push([cx + Math.cos(a)*r, cy + Math.sin(a)*r]);
  }
  return pts;
}

function floralPts(cx, cy, outerR, innerR, n, steps = 120) {
  let pts = [];
  for (let i = 0; i < steps; i++) {
    let t = i / steps;
    let a = t * Math.PI * 2 - Math.PI/2;
    let r = innerR + (outerR - innerR) * 0.5 * (1 + Math.cos(n * t * Math.PI * 2));
    pts.push([cx + Math.cos(a)*r, cy + Math.sin(a)*r]);
  }
  return pts;
}

function wedgePts(cx, cy, r, a1, a2, steps = 14) {
  let pts = [[cx, cy]];
  for (let i = 0; i <= steps; i++) {
    let a = a1 + (a2-a1) * (i/steps);
    pts.push([cx + Math.cos(a)*r, cy + Math.sin(a)*r]);
  }
  return pts;
}

// ─── Brush state helpers ──────────────────────────────────────────────────────

const bleed  = () => params.fillBleed   / 100;
const tex    = () => params.fillTexture / 100;
const linewt = () => params.lineWeight  / 100;

function setFill(col, opacity, bMult=1, tMult=1) {
  brush.noStroke();
  brush.noWash();
  brush.fill(col, opacity);
  brush.fillBleed(bleed()*bMult, 'out');
  brush.fillTexture(tex()*tMult, 0.45);
}

function setLine(type, col, wMult=1) {
  brush.noFill();
  brush.noWash();
  brush.set(type, col, linewt()*wMult);
}

// ─── Primary shapes (all centered, all at max radius) ─────────────────────────

function drawRings(cx, cy, maxR, colors, n) {
  let op = params.fillOpacity;
  for (let i = 0; i < n; i++) {
    let r   = maxR * (n-i) / n;
    let col = colors[i % colors.length];
    setFill(col, Math.max(40, op - i*4));
    brush.circle(cx, cy, r);
  }
}

function drawSpokes(cx, cy, maxR, colors, n) {
  // n radial wedge segments, each a different color
  for (let i = 0; i < n; i++) {
    let a1  = (i/n)*Math.PI*2 - Math.PI/2;
    let a2  = ((i+1)/n)*Math.PI*2 - Math.PI/2;
    let col = colors[i % colors.length];
    setFill(col, params.fillOpacity, 0.45, 0.7);
    brush.polygon(wedgePts(cx, cy, maxR, a1, a2));
  }
  // center dot
  setFill(colors[0], Math.min(params.fillOpacity+30,240), 0.3, 0.5);
  brush.circle(cx, cy, maxR * 0.10);
}

function drawSquare(cx, cy, maxR, colors) {
  // Divided by both diagonals into 4 triangles
  let s = maxR * 0.92;
  let TL=[cx-s,cy-s], TR=[cx+s,cy-s], BR=[cx+s,cy+s], BL=[cx-s,cy+s], C=[cx,cy];
  let tris = [[TL,TR,C],[TR,BR,C],[BR,BL,C],[BL,TL,C]];
  tris.forEach((t,i) => {
    setFill(colors[i % colors.length], params.fillOpacity, 0.4, 0.7);
    brush.polygon(t);
  });
  // inner circle
  setFill(colors[4 % colors.length], Math.min(params.fillOpacity+20,240), 0.3, 0.5);
  brush.circle(cx, cy, s * 0.28);
}

function drawTriangle(cx, cy, maxR, colors, depth) {
  depth = Math.min(depth, 5);
  // alternating upright and inverted triangles, nested
  for (let d = 0; d < depth; d++) {
    let r   = maxR * (depth-d) / depth;
    let rot = d%2===0 ? -Math.PI/2 : Math.PI/2;
    let col = colors[d % colors.length];
    setFill(col, Math.max(40, params.fillOpacity - d*8), 0.4, 0.65);
    brush.polygon(triPts(cx, cy, r, rot));
  }
}

function drawStar(cx, cy, maxR, colors, n) {
  n = Math.max(n, 5);
  let inner = maxR * 0.38;
  // fill each point arm individually for color variation
  for (let i = 0; i < n; i++) {
    let a0 = ((i*2)  /(n*2))*Math.PI*2 - Math.PI/2;
    let a1 = ((i*2+1)/(n*2))*Math.PI*2 - Math.PI/2;
    let a2 = ((i*2+2)/(n*2))*Math.PI*2 - Math.PI/2;
    let p0 = [cx+Math.cos(a0)*inner, cy+Math.sin(a0)*inner];
    let tip = [cx+Math.cos(a1)*maxR,  cy+Math.sin(a1)*maxR ];
    let p2 = [cx+Math.cos(a2)*inner, cy+Math.sin(a2)*inner];
    setFill(colors[i % colors.length], params.fillOpacity, 0.3, 0.6);
    brush.polygon([p0, tip, p2]);
  }
  // inner polygon fill
  let innerPts = [];
  for (let i = 0; i < n; i++) {
    let a = (i/n)*Math.PI*2 - Math.PI/2;
    innerPts.push([cx+Math.cos(a)*inner, cy+Math.sin(a)*inner]);
  }
  setFill(colors[n % colors.length], Math.min(params.fillOpacity+20,240), 0.3, 0.5);
  brush.polygon(innerPts);
}

function drawFloral(cx, cy, maxR, colors, n) {
  n = Math.max(n, 4);
  let inner = maxR * 0.30;
  // each petal as a filled circle offset from center
  let petalR = (maxR - inner) * 0.72;
  let petalD = inner + petalR * 0.55;
  for (let i = 0; i < n; i++) {
    let a   = (i/n)*Math.PI*2 - Math.PI/2;
    let pcx = cx + Math.cos(a)*petalD;
    let pcy = cy + Math.sin(a)*petalD;
    setFill(colors[i % colors.length], params.fillOpacity, 0.38, 0.6);
    brush.circle(pcx, pcy, petalR);
  }
  // center
  setFill(colors[1 % colors.length], Math.min(params.fillOpacity+30,245), 0.25, 0.4);
  brush.circle(cx, cy, inner);
}

function drawNested(cx, cy, maxR, colors, n) {
  // nested squares, alternating rotation
  for (let i = 0; i < n; i++) {
    let s   = maxR * (n-i) / n;
    let rot = (i%2===0) ? 0 : Math.PI/4;
    let col = colors[i % colors.length];
    setFill(col, Math.max(40, params.fillOpacity - i*5), 0.38, 0.6);
    brush.polygon(squarePts(cx, cy, s, rot));
  }
}

function drawCross(cx, cy, maxR, colors) {
  let arm = maxR * 0.28;
  let r   = maxR * 0.92;
  // horizontal bar
  setFill(colors[0], params.fillOpacity, 0.4, 0.65);
  brush.polygon([[cx-r,cy-arm],[cx+r,cy-arm],[cx+r,cy+arm],[cx-r,cy+arm]]);
  // vertical bar
  setFill(colors[1 % colors.length], params.fillOpacity, 0.4, 0.65);
  brush.polygon([[cx-arm,cy-r],[cx+arm,cy-r],[cx+arm,cy+r],[cx-arm,cy+r]]);
  // center
  setFill(colors[2 % colors.length], Math.min(params.fillOpacity+30,245), 0.3, 0.5);
  brush.circle(cx, cy, arm*0.9);
}

function drawPrimaryShape(cx, cy, maxR, colors) {
  let n = params.count;
  switch (params.primaryShape) {
    case 'rings':    drawRings(cx, cy, maxR, colors, n);    break;
    case 'spokes':   drawSpokes(cx, cy, maxR, colors, n);   break;
    case 'square':   drawSquare(cx, cy, maxR, colors);       break;
    case 'triangle': drawTriangle(cx, cy, maxR, colors, Math.min(n,5)); break;
    case 'star':     drawStar(cx, cy, maxR, colors, n);     break;
    case 'floral':   drawFloral(cx, cy, maxR, colors, n);   break;
    case 'nested':   drawNested(cx, cy, maxR, colors, n);   break;
    case 'cross':    drawCross(cx, cy, maxR, colors);        break;
  }
}

// ─── Overlay layer ────────────────────────────────────────────────────────────

function drawOverlayShape(cx, cy, maxR, colors, lineCol) {
  let type = params.overlay;
  if (type === 'none') return;

  let r  = maxR * 0.70;
  let n  = Math.max(params.count, 5);
  let op = Math.round(params.fillOpacity * 0.42);

  switch (type) {
    case 'rings':
      // 3 ring outlines only
      for (let i = 1; i <= 3; i++) {
        setLine(params.lineBrush, lineCol, linewt()*0.45);
        brush.circle(cx, cy, r * i / 3);
      }
      break;

    case 'star':
      setFill(colors[(n+2) % colors.length], op, 0.25, 0.5);
      brush.polygon(starPts(cx, cy, r, r*0.4, n));
      setLine(params.lineBrush, lineCol, linewt()*0.5);
      brush.polygon(starPts(cx, cy, r, r*0.4, n));
      break;

    case 'triangle': {
      let tPts = triPts(cx, cy, r);
      setFill(colors[2 % colors.length], op, 0.2, 0.5);
      brush.polygon(tPts);
      setLine(params.lineBrush, lineCol, linewt()*0.5);
      brush.polygon(tPts);
      // inverted inner
      let tPts2 = triPts(cx, cy, r*0.55, Math.PI/2);
      setFill(colors[5 % colors.length], op, 0.2, 0.5);
      brush.polygon(tPts2);
      setLine(params.lineBrush, lineCol, linewt()*0.4);
      brush.polygon(tPts2);
      break;
    }

    case 'diamond': {
      let dPts = squarePts(cx, cy, r*0.78, Math.PI/4);
      setFill(colors[3 % colors.length], op, 0.2, 0.5);
      brush.polygon(dPts);
      setLine(params.lineBrush, lineCol, linewt()*0.5);
      brush.polygon(dPts);
      break;
    }

    case 'spokes':
      for (let i = 0; i < n; i++) {
        let a1 = (i/n)*Math.PI*2 - Math.PI/2;
        let a2 = ((i+1)/n)*Math.PI*2 - Math.PI/2;
        setFill(colors[(i+3) % colors.length], op, 0.2, 0.5);
        brush.polygon(wedgePts(cx, cy, r, a1, a2));
      }
      break;

    case 'floral': {
      let fPts = floralPts(cx, cy, r, r*0.35, n);
      setFill(colors[4 % colors.length], op, 0.2, 0.5);
      brush.polygon(fPts);
      setLine(params.lineBrush, lineCol, linewt()*0.45);
      brush.polygon(fPts);
      break;
    }
  }
}

// ─── Linework styles ──────────────────────────────────────────────────────────

function drawLinework(cx, cy, maxR, lineCol) {
  let style   = params.lineStyle;
  let density = params.lineDensity;
  if (style === 'none') return;

  let wt = linewt();

  switch (style) {

    case 'cross':
      // 2 or 4 axis lines + optional diagonals
      setLine(params.lineBrush, lineCol, wt*0.42);
      brush.line(cx, 20, cx, height-20);
      brush.line(20, cy, width-20, cy);
      if (density > 4) {
        setLine('2H', lineCol, wt*0.28);
        let d = Math.max(cx,cy)*1.1;
        brush.line(cx-d, cy-d, cx+d, cy+d);
        brush.line(cx+d, cy-d, cx-d, cy+d);
      }
      if (density > 7) {
        let off = maxR * 0.55;
        setLine('2H', lineCol, wt*0.22);
        brush.line(cx-off, 20, cx-off, height-20);
        brush.line(cx+off, 20, cx+off, height-20);
        brush.line(20, cy-off, width-20, cy-off);
        brush.line(20, cy+off, width-20, cy+off);
      }
      break;

    case 'radial': {
      let n = density * 2 + 2;  // 4–26 lines
      setLine(params.lineBrush, lineCol, wt*0.38);
      for (let i = 0; i < n; i++) {
        let a = (i/n)*Math.PI*2;
        let ext = Math.max(width, height);
        brush.line(cx, cy, cx+Math.cos(a)*ext, cy+Math.sin(a)*ext);
      }
      break;
    }

    case 'sunburst': {
      let n = density * 5 + 6;  // 11–66 rays
      setLine(params.lineBrush, lineCol, wt*0.22);
      let ext = Math.max(width, height) * 0.8;
      for (let i = 0; i < n; i++) {
        let a = (i/n)*Math.PI*2;
        brush.line(cx, cy, cx+Math.cos(a)*ext, cy+Math.sin(a)*ext);
      }
      break;
    }

    case 'concentric': {
      let n = density + 1;  // 2–13 circles
      setLine('2H', lineCol, wt*0.26);
      for (let i = 1; i <= n; i++) {
        brush.circle(cx, cy, maxR * i / n);
      }
      // outer ones extend past maxR slightly
      if (density > 6) {
        for (let i = 1; i <= 3; i++) {
          brush.circle(cx, cy, maxR + maxR * 0.15 * i);
        }
      }
      break;
    }

    case 'grid': {
      let n  = density + 2;   // 3–14 divisions
      let m  = 20;
      let step = (width - m*2) / n;
      setLine('2H', lineCol, wt*0.22);
      for (let i = 0; i <= n; i++) {
        let x = m + i*step;
        let y = m + i*step;
        brush.line(x, m, x, height-m);
        brush.line(m, y, width-m, y);
      }
      break;
    }

    case 'diagonal': {
      let n  = density + 2;   // 3–14 lines per direction
      let span = width * 2.2;
      setLine(params.lineBrush, lineCol, wt*0.32);
      for (let i = 0; i < n; i++) {
        let offset = (i/(n-1)) * width - width/2;
        brush.line(cx+offset-span/2, cy-span/2, cx+offset+span/2, cy+span/2);
        brush.line(cx+offset-span/2, cy+span/2, cx+offset+span/2, cy-span/2);
      }
      break;
    }

    case 'frame': {
      let m = 24 + density * 4;
      setLine('2H', lineCol, wt*0.24);
      brush.line(m, m, width-m, m);
      brush.line(m, height-m, width-m, height-m);
      brush.line(m, m, m, height-m);
      brush.line(width-m, m, width-m, height-m);
      if (density > 4) {
        // double frame
        let m2 = m + 10;
        brush.line(m2, m2, width-m2, m2);
        brush.line(m2, height-m2, width-m2, height-m2);
        brush.line(m2, m2, m2, height-m2);
        brush.line(width-m2, m2, width-m2, height-m2);
      }
      break;
    }
  }
}

// ─── Corner swatches ─────────────────────────────────────────────────────────

function drawCornerSwatches(colors) {
  let m=28, sw=11, sg=4, n=Math.min(colors.length,7);
  push(); noStroke();
  for (let i=0; i<n; i++) { fill(colors[i]); rect(m+i*(sw+sg), height-m-sw, sw, sw); }
  pop();
}

// ─── p5 Sketch ────────────────────────────────────────────────────────────────

function setup() {
  let cnv = createCanvas(700, 700, WEBGL);
  cnv.parent('canvas-container');
  pixelDensity(1);
  brush.load();
  brush.scaleBrushes(3.6);
  noLoop();
  generate();
}

function draw() {
  randomSeed(params.seed);

  // canvas background is always this fixed off-white
  background(252, 251, 248);

  // WEBGL origin is center — shift to top-left
  translate(-width/2, -height/2);

  brush.clip([0, 0, width, height]);

  let pal  = PALETTES[params.palette];
  let cx   = width/2, cy = height/2;
  let maxR = (width/2) * (params.ringScale/100);

  drawPrimaryShape(cx, cy, maxR, pal.colors);
  drawOverlayShape(cx, cy, maxR, pal.colors, pal.lineColor);
  drawLinework(cx, cy, maxR, pal.lineColor);
  drawCornerSwatches(pal.colors);

  brush.noClip();
}

function generate() {
  setStatus('Rendering…');
  setTimeout(() => { redraw(); setStatus(''); }, 20);
}

// ─── UI ───────────────────────────────────────────────────────────────────────

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function updatePaletteDots() {
  let c = PALETTES[params.palette].colors;
  document.getElementById('palette-dots').innerHTML =
    c.map(col => `<div class="dot" style="background:${col}"></div>`).join('');
}

function syncUI() {
  const sv = (id,v) => { let e=document.getElementById(id); if(e) e.value=v; };
  sv('sel-palette',   params.palette);
  sv('sel-shape',     params.primaryShape);
  sv('sel-overlay',   params.overlay);
  sv('sl-scale',      params.ringScale);
  sv('sl-count',      params.count);
  sv('sl-opacity',    params.fillOpacity);
  sv('sl-bleed',      params.fillBleed);
  sv('sl-texture',    params.fillTexture);
  sv('sel-brush',     params.lineBrush);
  sv('sel-linestyle', params.lineStyle);
  sv('sl-density',    params.lineDensity);
  sv('sl-weight',     params.lineWeight);
  sv('sl-seed',       params.seed);
  updateLabels();
  updatePaletteDots();
}

function updateLabels() {
  const sv = (id,v) => { let e=document.getElementById(id); if(e) e.textContent=v; };
  sv('val-scale',   params.ringScale + '%');
  sv('val-count',   params.count);
  sv('val-opacity', params.fillOpacity);
  sv('val-bleed',   (params.fillBleed  /100).toFixed(2));
  sv('val-texture', (params.fillTexture/100).toFixed(2));
  sv('val-density', params.lineDensity);
  sv('val-weight',  (params.lineWeight /100).toFixed(2));
  sv('val-seed',    params.seed);
}

function bindSlider(id, key) {
  let el = document.getElementById(id);
  el.addEventListener('input',  () => { params[key]=Number(el.value); updateLabels(); });
  el.addEventListener('change', () => { params[key]=Number(el.value); updateLabels(); generate(); });
}
function bindSelect(id, key, cb) {
  let el = document.getElementById(id);
  el.addEventListener('change', () => { params[key]=el.value; if(cb)cb(); generate(); });
}

function initUI() {
  bindSlider('sl-scale',   'ringScale');
  bindSlider('sl-count',   'count');
  bindSlider('sl-opacity', 'fillOpacity');
  bindSlider('sl-bleed',   'fillBleed');
  bindSlider('sl-texture', 'fillTexture');
  bindSlider('sl-density', 'lineDensity');
  bindSlider('sl-weight',  'lineWeight');
  bindSlider('sl-seed',    'seed');

  bindSelect('sel-palette',   'palette',      updatePaletteDots);
  bindSelect('sel-shape',     'primaryShape');
  bindSelect('sel-overlay',   'overlay');
  bindSelect('sel-brush',     'lineBrush');
  bindSelect('sel-linestyle', 'lineStyle');

  document.getElementById('btn-theme').addEventListener('click', () => {
    params.darkMode = !params.darkMode;
    document.documentElement.setAttribute('data-theme', params.darkMode ? 'dark' : 'light');
    // no redraw needed — canvas bg is fixed
  });

  document.getElementById('btn-randomize').addEventListener('click', () => {
    let r = () => Math.random();
    let pkeys  = Object.keys(PALETTES);
    let shapes = ['rings','spokes','square','triangle','star','floral','nested','cross'];
    let overs  = ['none','none','rings','star','triangle','diamond','spokes','floral'];
    let lstyle = ['cross','radial','sunburst','concentric','grid','diagonal','frame','none'];

    params.palette      = pkeys [Math.floor(r()*pkeys.length)];
    params.primaryShape = shapes[Math.floor(r()*shapes.length)];
    params.overlay      = overs [Math.floor(r()*overs.length)];
    params.lineStyle    = lstyle[Math.floor(r()*lstyle.length)];
    params.ringScale    = Math.floor(r()*48)+28;
    params.count        = Math.floor(r()*8)+4;
    params.fillOpacity  = Math.floor(r()*120)+70;
    params.fillBleed    = Math.floor(r()*65)+15;
    params.fillTexture  = Math.floor(r()*60)+10;
    params.lineDensity  = Math.floor(r()*10)+1;
    params.lineWeight   = Math.floor(r()*120)+20;
    params.seed         = Math.floor(r()*998)+1;
    params.lineBrush    = ['cpencil','HB','2B','2H','pen'][Math.floor(r()*5)];
    syncUI();
    generate();
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    saveCanvas('hilma_'+params.palette+'_'+params.seed, 'png');
  });

  updatePaletteDots();
}

window.addEventListener('load', initUI);
</script>
