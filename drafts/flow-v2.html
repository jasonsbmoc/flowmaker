<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painted</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: crosshair;
    }

    /* ── Bar ────────────────────────────────────────────── */
    #bar {
      height: 58px;
      background: #111;
      border-top: 1px solid #1d1d1d;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #bar::-webkit-scrollbar { display: none; }

    .sep { width: 1px; height: 28px; background: #1e1e1e; flex-shrink: 0; }

    .ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .lbl {
      font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: #444; white-space: nowrap;
    }

    .vdisp {
      font-size: 10px; color: #3c3c3c; font-family: monospace; min-width: 28px;
    }

    .abtn {
      background: none; border: 1px solid #242424; color: #999;
      width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .12s, border-color .12s;
    }
    .abtn:hover { background: #1b1b1b; border-color: #333; color: #ccc; }

    input[type="range"] {
      width: 78px; appearance: none; height: 2px;
      background: #222; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 11px; height: 11px; border-radius: 50%;
      background: #5a5a5a; cursor: pointer; transition: background .1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { background: #bbb; }

    input[type="color"] {
      width: 28px; height: 28px; border: 1px solid #222;
      border-radius: 4px; padding: 2px; cursor: pointer; background: none;
    }

    /* Angle picker */
    #angle-pick {
      width: 38px; height: 38px;
      flex-shrink: 0; cursor: crosshair;
      user-select: none; -webkit-user-select: none;
    }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="bar">

  <div class="ctrl">
    <button id="btn-render" class="abtn" title="Regenerate">↺</button>
    <button id="btn-export" class="abtn" title="Save PNG" style="font-size:16px">↓</button>
  </div>

  <div class="sep"></div>

  <div class="ctrl">
    <span class="lbl">Ink</span>
    <input type="color" id="col-ink" value="#6b8c42">
    <span class="lbl" style="margin-left:3px">Paper</span>
    <input type="color" id="col-paper" value="#f0ece2">
  </div>

  <div class="sep"></div>

  <div class="ctrl">
    <span class="lbl">Density</span>
    <input type="range" id="sl-density" min="1" max="10" value="5" step="1">
    <span class="vdisp" id="vd-density">5</span>
  </div>

  <div class="ctrl">
    <span class="lbl">Length</span>
    <input type="range" id="sl-length" min="1" max="10" value="6" step="1">
    <span class="vdisp" id="vd-length">6</span>
  </div>

  <div class="ctrl">
    <span class="lbl">Smear</span>
    <input type="range" id="sl-smear" min="1" max="10" value="6" step="1">
    <span class="vdisp" id="vd-smear">6</span>
  </div>

  <div class="ctrl">
    <span class="lbl">Soft</span>
    <input type="range" id="sl-soft" min="1" max="10" value="5" step="1">
    <span class="vdisp" id="vd-soft">5</span>
  </div>

  <div class="sep"></div>

  <div class="ctrl">
    <span class="lbl">Angle</span>
    <div id="angle-pick">
      <svg id="angle-svg" width="38" height="38" viewBox="0 0 38 38">
        <circle cx="19" cy="19" r="14" fill="none" stroke="#252525" stroke-width="1.5"/>
        <circle cx="19" cy="19" r="1.5" fill="#333"/>
        <line id="ang-line" x1="19" y1="19" x2="33" y2="19"
              stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>
        <circle id="ang-dot" cx="33" cy="19" r="3.5" fill="#686868"/>
      </svg>
    </div>
    <span class="vdisp" id="vd-angle">45°</span>
  </div>

  <div class="ctrl">
    <span class="lbl">Turbulence</span>
    <input type="range" id="sl-turbulence" min="0" max="10" value="2" step="1">
    <span class="vdisp" id="vd-turbulence">2</span>
  </div>

  <div class="sep"></div>

  <div class="ctrl">
    <span class="lbl">Seed</span>
    <input type="range" id="sl-seed" min="0" max="999" value="42" step="1">
    <span class="vdisp" id="vd-seed">42</span>
  </div>

</div>

<script>
// ─── Seeded PRNG (mulberry32) ──────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function lerp(a, b, t) { return a + (b - a) * t; }
function norm(v, lo, hi) { return (v - lo) / (hi - lo); }

// ─── Config ───────────────────────────────────────────────────────────────────
const cfg = {
  ink:        '#6b8c42',
  paper:      '#f0ece2',
  density:    5,
  length:     6,
  smear:      6,
  soft:       5,
  angle:      Math.PI / 4,
  turbulence: 2,
  seed:       42,
};

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w   = wrap.clientWidth;
  const h   = wrap.clientHeight;
  canvas.width        = Math.round(w * dpr);
  canvas.height       = Math.round(h * dpr);
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  render();
}

window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 120); });
let resizeTimer;

// ─── Core drawing ─────────────────────────────────────────────────────────────

// One gaussian splat rendered in unit-circle space (pre-transform required).
// softness 0 → crisp disc with feathered edge
// softness 1 → fully diffuse cloud, fades from dead center
function gaussianFill(r, g, b, peakAlpha, softness) {
  // stop1: how far from center the gradient stays at near-full alpha (flat core)
  // stop2: where it has dropped to near-zero
  // At low softness: wide flat core, sharp cutoff → crisp
  // At high softness: no flat core, very gradual → diffuse
  const stop1 = lerp(0.42, 0.02, softness);
  const stop2 = lerp(0.68, 0.97, softness);

  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
  grad.addColorStop(0,     `rgba(${r},${g},${b},${peakAlpha.toFixed(4)})`);
  grad.addColorStop(stop1, `rgba(${r},${g},${b},${(peakAlpha * 0.85).toFixed(4)})`);
  grad.addColorStop(stop2, `rgba(${r},${g},${b},${(peakAlpha * 0.08).toFixed(4)})`);
  grad.addColorStop(1,     `rgba(${r},${g},${b},0)`);

  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// Draw one painterly stroke as a chain of gaussian blobs along a (possibly curved) path.
// x, y      — stroke centre
// angle     — primary direction (radians)
// halfLen   — half the total path length
// blobLong  — each blob's along-axis half-radius (smear determines per-blob elongation)
// blobR     — each blob's cross-axis half-radius (from soft)
// turbAmt   — 0..1 warp magnitude
// warpPhase — per-stroke random phase so curves don't all look the same
function drawStroke(x, y, angle, halfLen, blobLong, blobR, r, g, b, alpha, softness, turbAmt, warpPhase) {
  const stepDist = blobR * 0.62;    // spacing between blob centres — tight overlap
  const nSteps   = Math.min(60, Math.max(2, Math.round(halfLen * 2 / stepDist)));

  // warp amplitude: fraction of blobR, grows with turbulence
  const warpAmp  = blobR * turbAmt * 6.0;
  // warp frequency: how many S-curves across the stroke (1.5 = gently curving)
  const warpFreq = Math.PI * 3.0;

  for (let i = 0; i <= nSteps; i++) {
    const t     = i / nSteps;
    const along = (t - 0.5) * halfLen * 2;

    // Perpendicular warp — zero at both endpoints (natural stroke taper)
    const envelope = Math.sin(t * Math.PI);
    const perp     = Math.sin(t * warpFreq + warpPhase) * warpAmp * envelope;

    // World position
    const px = x + Math.cos(angle) * along - Math.sin(angle) * perp;
    const py = y + Math.sin(angle) * along + Math.cos(angle) * perp;

    // Local tangent: blend global angle toward path tangent for natural blob rotation
    let localAngle = angle;
    if (turbAmt > 0.01) {
      // Derivative of perp w.r.t. t (approximate via finite diff, cheaper than full analytic)
      const dPerp = (Math.cos(t * warpFreq + warpPhase) * warpFreq * warpAmp * envelope
                   + Math.sin(t * warpFreq + warpPhase) * warpAmp * Math.PI * Math.cos(t * Math.PI));
      const dAlong = halfLen * 2;
      localAngle = angle + Math.atan2(-dPerp / nSteps, dAlong / nSteps) * 0.55;
    }

    // Alpha: taper at ends, keep middle solid
    const a = alpha * Math.pow(envelope, 0.4);
    if (a < 0.005) continue;

    // ── Outer halo ──────────────────────────────────────────────────────────
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(localAngle);
    ctx.scale(blobLong * 1.5, blobR * 1.6);
    gaussianFill(r, g, b, a * 0.22, Math.min(softness + 0.18, 1.0));
    ctx.restore();

    // ── Inner pigment core ───────────────────────────────────────────────────
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(localAngle);
    ctx.scale(blobLong, blobR);
    gaussianFill(r, g, b, a * 0.78, softness);
    ctx.restore();
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const W   = canvas.width;
  const H   = canvas.height;
  const rng = mkRng(cfg.seed * 9301 + 49297);

  // Background
  const [pr, pg, pb] = hexRgb(cfg.paper);
  ctx.fillStyle = `rgb(${pr},${pg},${pb})`;
  ctx.fillRect(0, 0, W, H);

  const [ir, ig, ib] = hexRgb(cfg.ink);

  // ── Parameter → pixel mappings ────────────────────────────────────────────
  const scale = Math.min(W, H) / 900;

  // Stroke count: quadratic so high density feels meaningfully denser
  const td    = norm(cfg.density, 1, 10);
  const count = Math.round(lerp(4, 80, td * td));

  // Cross-axis blob radius (soft): extra-wide range, shrunken at the low end
  const ts   = norm(cfg.soft, 1, 10);
  const blobR = lerp(7, 210, ts * ts) * scale;   // quadratic so low soft = really tight

  // Softness of gradient falloff: 0=crisp disc, 1=diffuse cloud
  const softness = lerp(0.0, 1.0, ts);

  // Per-blob elongation along stroke axis (smear)
  const tsm      = norm(cfg.smear, 1, 10);
  const blobLong = blobR * lerp(1.0, 9.0, tsm);  // smear=1: round; smear=10: 9:1 oval

  // Total path half-length (length × a multiplier of blobR so scale is consistent)
  const tl      = norm(cfg.length, 1, 10);
  const halfLen = blobR * lerp(1.5, 28.0, tl);

  // Turbulence: 0=straight, 1=wildly curved
  const turbAmt = norm(cfg.turbulence, 0, 10);

  // Per-stroke alpha: compensate for density so canvas doesn't go flat
  const baseAlpha = lerp(0.85, 0.08, Math.pow(td, 0.7));

  // ── Draw strokes ──────────────────────────────────────────────────────────
  for (let i = 0; i < count; i++) {
    const x          = rng() * W;
    const y          = rng() * H;
    const ang        = cfg.angle + (rng() - 0.5) * 0.12;   // tiny natural jitter only
    const aVar       = lerp(0.45, 1.0, rng());
    const sVar       = lerp(0.70, 1.30, rng());
    const warpPhase  = rng() * Math.PI * 2;

    drawStroke(
      x, y, ang,
      halfLen * sVar, blobLong * sVar, blobR * sVar,
      ir, ig, ib,
      baseAlpha * aVar, softness,
      turbAmt, warpPhase
    );
  }
}

let renderTimer;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 35);
}

// ─── Angle picker ─────────────────────────────────────────────────────────────
const angPick  = document.getElementById('angle-pick');
const angLine  = document.getElementById('ang-line');
const angDot   = document.getElementById('ang-dot');
const angDisp  = document.getElementById('vd-angle');
const PICK_CX = 19, PICK_CY = 19, PICK_R = 14;

function applyAngle(rad) {
  cfg.angle = rad;
  const ex = (PICK_CX + Math.cos(rad) * PICK_R).toFixed(2);
  const ey = (PICK_CY + Math.sin(rad) * PICK_R).toFixed(2);
  angLine.setAttribute('x2', ex);
  angLine.setAttribute('y2', ey);
  angDot.setAttribute('cx', ex);
  angDot.setAttribute('cy', ey);
  angDisp.textContent = Math.round(((rad * 180 / Math.PI) % 360 + 360) % 360) + '°';
}

function angleFromPointer(e) {
  const rect = angPick.getBoundingClientRect();
  const cx   = rect.left + rect.width  / 2;
  const cy   = rect.top  + rect.height / 2;
  const src  = e.touches ? e.touches[0] : e;
  return Math.atan2(src.clientY - cy, src.clientX - cx);
}

let pickDrag = false;
angPick.addEventListener('mousedown',  e => { pickDrag = true;  applyAngle(angleFromPointer(e)); scheduleRender(); });
window.addEventListener('mousemove',   e => { if (!pickDrag) return; applyAngle(angleFromPointer(e)); scheduleRender(); });
window.addEventListener('mouseup',     () => { pickDrag = false; });
angPick.addEventListener('touchstart', e => { e.preventDefault(); pickDrag = true;  applyAngle(angleFromPointer(e)); scheduleRender(); }, { passive: false });
window.addEventListener('touchmove',   e => { if (!pickDrag) return; applyAngle(angleFromPointer(e)); scheduleRender(); });
window.addEventListener('touchend',    () => { pickDrag = false; });

applyAngle(Math.PI / 4); // init dot at 45°

// ─── Slider / color bindings ──────────────────────────────────────────────────
function bindRange(id, key, dispId) {
  const el   = document.getElementById(id);
  const disp = dispId ? document.getElementById(dispId) : null;
  el.addEventListener('input', () => {
    cfg[key] = Number(el.value);
    if (disp) disp.textContent = el.value;
    scheduleRender();
  });
}

function bindColor(id, key) {
  document.getElementById(id).addEventListener('input', e => {
    cfg[key] = e.target.value;
    scheduleRender();
  });
}

bindRange('sl-density', 'density', 'vd-density');
bindRange('sl-length',  'length',  'vd-length');
bindRange('sl-smear',   'smear',   'vd-smear');
bindRange('sl-soft',    'soft',    'vd-soft');
bindRange('sl-turbulence', 'turbulence', 'vd-turbulence');
bindRange('sl-seed',    'seed',    'vd-seed');
bindColor('col-ink',    'ink');
bindColor('col-paper',  'paper');

document.getElementById('btn-render').addEventListener('click', render);

document.getElementById('btn-export').addEventListener('click', () => {
  const a   = document.createElement('a');
  a.download = 'painted_' + Date.now() + '.png';
  a.href     = canvas.toDataURL('image/png');
  a.click();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
resize();
</script>
</body>
</html>
